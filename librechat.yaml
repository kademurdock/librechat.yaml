      # (openai/azureOpenAI/...), but the CLIENT understands browser|external -
      # an upstream LibreChat mismatch. "openai" must stay (anything else fails
      # boot validation); the fork's useSpeechSettingsInit maps these legacy
      # provider names to "external" so new accounts get platform voices
      # instead of the device's system voice (iOS Samantha bug).
