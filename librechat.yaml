version: 1.1.5
cache: true
fileStrategy: 's3'

endpoints:
  # KADE July 4 2026: agent-builder capabilities trimmed to ONLY what this
  # platform uses, so the builder's Capabilities section stops cluttering
  # beginner builders with toggles for features nobody here touches.
  # KEPT: deferred_tools (tool-loading plumbing, left on deliberately),
  #   file_search (RAG), web_search, actions (Forge's proxy actions),
  #   context (read uploaded files as plain text), tools (all kade_* tools).
  # REMOVED July 4: artifacts, subagents, skills, chain, ocr — all unused on a
  #   blind-first platform (no code-artifact/subagent/OCR use). execute_code was
  #   already removed July 2 (hosted Code Interpreter closed signups).
  # RESTORE any one: add its string back below + redeploy LibreChat.
  # RESTORE stock: delete this whole "agents:" block.
  agents:
    capabilities:
      - "deferred_tools"
      - "file_search"
      - "web_search"
      - "actions"
      - "context"
      - "tools"
  custom:
    - name: "OpenRouter"
      apiKey: "${REFRAME_PROXY_SECRET}"
      baseURL: "https://reframe-proxy-production.up.railway.app"
      models:
        # Curated picker (July 1 2026, Kade's ask — the full OpenRouter catalog
        # was overwhelming agent builders). fetch:false pins the dropdown to
        # this list. Any model string still WORKS if an agent already has it;
        # this only controls what the picker offers. Every model here was
        # verified live on OpenRouter July 2026.
        default: [
          "z-ai/glm-5.2",              # house default — smart, reliable tools
          # "minimax/minimax-m2-her" REMOVED July 2 2026: its single OpenRouter
          # endpoint supports NO tools param — any agent with tools on it fails
          # near-silently with empty turns (this silently broke Zadiana for a
          # day). Existing agents on the string would keep working; none are.
          "minimax/minimax-m3",        # flagship, sees images
          "z-ai/glm-4.7",              # cheaper GLM, solid all-rounder
          "deepseek/deepseek-v4-flash",# very cheap + fast, huge memory
          "deepseek/deepseek-v4-pro",  # heavyweight thinker
          "google/gemini-3-flash-preview", # fast, sees images/audio/video
          "google/gemini-3.1-flash-lite",  # FASTEST tested (0.9s replies, July 2) — try for snappy characters
          "google/gemini-2.5-flash-lite",  # cheapest quick chat
          "xiaomi/mimo-v2.5",          # cheap omni all-rounder
          "openai/gpt-4o-mini",        # familiar + cheap
          "mistralai/mistral-nemo",    # cheap creative roleplay classic
        ]
        fetch: false
      titleConvo: true
      titleModel: "z-ai/glm-5.2"
      modelDisplayLabel: "OpenRouter"
      dropParams: ["stop"]
      addParams:
        reasoning:
          exclude: false
      customParams:
        reasoningKey: "reasoning"
        includeReasoningHistory: false

webSearch:
  searchProvider: "tavily"
  scraperProvider: "tavily"
  tavilyApiKey: "${TAVILY_API_KEY}"
  rerankerType: "none"

# Prepaid Stage A (2026-07-05): every account (invite-code gated) starts with
# $10 of credit (10,000,000 tokenCredits; 1,000,000 = $1). Credit is shared across
# ALL services (LLM + TTS + images + video/audio + phone). When it runs out the
# user asks Kade for more (NO auto-refill). ADMIN (Kade) is code-exempt everywhere
# — she never draws down or gets capped (fixes the July 4 self-lockout). The hard
# cutoff on CHAT is deliberately NOT enabled yet (needs existing-user seeding + a
# supervised test); the money-heavy fal path IS hard-capped in code.
balance:
  enabled: true
  startBalance: 10000000
  autoRefillEnabled: false
  refillIntervalValue: 30
  refillIntervalUnit: "days"
  refillAmount: 10000000

memory:
  disabled: false
  personalize: true
  tokenLimit: 100000
  validKeys: ["preferences", "work_info", "personal_info", "skills", "interests", "context", "secrets"]
  agent:
    enabled: true
    provider: "OpenRouter"
    model: "z-ai/glm-5.2"
    instructions: |
      Only write a memory when something durable and reusable shows up: stable preferences, identity facts, ongoing projects, recurring context, or explicitly stated secrets. Skip one-off remarks, small talk, and anything you'd only need for this single reply.

      You have two kinds of memory. The keys preferences, work_info, personal_info, skills, interests, context, and secrets are SHARED -- every assistant on this platform sees them, so only put things there that any assistant should know about Kade regardless of which persona is talking to her. The key agent_notes is YOURS ALONE -- nothing another persona wrote there is visible to you, and nothing you write there is visible to them. Use agent_notes for anything that's really about your own relationship with Kade specifically: running bits only you do, things you personally were in the middle of with her, your own read on how she likes you to act -- the stuff that makes you a specific character with a memory of your own, not a shared file everyone's reading from. If a fact is genuinely general-purpose (a real fact about her life, work, or preferences), use a shared key instead of agent_notes, even if you happen to be the one who learned it.

      Before writing, check whether this updates or contradicts an existing memory under the same key, in the same bucket (shared or agent_notes -- they don't share keys with each other). If so, use set_memory on that same key to update it instead of inventing a new one -- never store the same fact twice.

      If nothing in this message meets that bar, save nothing. Most turns should result in zero memory writes; that is expected, not a failure.
      When you do write, keep it short: plain facts, not narration or reasoning about why it matters.

interface:
  customWelcome: "Welcome to Kade-AI, {{user.name}} — Kade's own corner of the internet, where you chat with AI characters and she quietly foots the bill. No instructions needed: type like you'd text a friend, and your character takes it from there. Brand new to AI? There's a two-minute, plain-language guide at kademurdock.com/help/start-here — the whole help center is written for beginners and works beautifully with screen readers. Everything fun (the Debate Room, your creations, what your chats cost) lives under your account menu, bottom-left, in Explore. And if anything ever feels broken or confusing, tell Kade — the site gets better every time someone speaks up."
  # NOTE (June 27 2026): customFooter is NOT a valid interface.* key in LibreChat's schema --
  # it gets silently stripped here and does nothing. The real footer text is set via the
  # CUSTOM_FOOTER Railway env var on the LibreChat service itself, not through this file.
  # See PROJECT_STATUS.md "footer/voice library bug" entry for the full story.
  #
  # NOTE (June 28 2026): the footer (which holds the Voice Library, donate, and
  # help links) is rendered by LibreChat's Footer.tsx with Tailwind classes
  # hidden ... sm:flex -- meaning it's removed from the DOM entirely below a
  # 640px-wide viewport, i.e. on phones, for EVERY user regardless of assistive
  # tech. This is an upstream LibreChat limitation, not a config bug -- there's
  # no yaml/env-var override for it. A true fix means forking+rebuilding
  # LibreChat's client image, which is a bigger infra decision Kade hasn't
  # signed off on. Workaround shipped here instead: the same Voice Library and
  # Help links are now folded into customWelcome above, since that renders as
  # normal chat content and stays in the accessibility tree at every viewport
  # width. Donate link was already there. This is a workaround, not a fix --
  # flagged clearly to Kade in the June 28 2026 PROJECT_STATUS.md entry.
  termsOfService:
    modalAcceptance: true
    modalTitle: "Kade-AI House Rules"
    modalContent: |
      # Kade-AI Terms of Service
      ## a.k.a. The House Rules

      *Effective whenever you happen to be reading this.*

      Welcome to Kade-AI. Using this site means you're cool with a few things. It's short — I respect your time more than most companies respect yours.

      ## 1. This Is My House
      Kade-AI runs on my server, my accounts, and my actual money. That makes me the landlord. Be a good tenant and we'll get along great.

      ## 2. Privacy, For Real
      I'm not selling your data. More importantly: I physically and mechanically cannot see your chats. The system is locked down, and I don't have a way (or the desire) to monitor what you're typing. Spill your secrets, build your weirdest characters, or use it as a sealed confessional—your text is safe from my eyes.

      ## 3. Don't Be a Menace
      No illegal nonsense, no harassing other people on here, no using this to hurt anybody. Build funny characters, weird characters, brilliant characters — just keep it not-evil.

      ## 4. The Tokens Aren't Free (To Me)
      Every message you fire off costs me real money behind the curtain. You get a fresh ~$10 allowance each month; use it, enjoy it, but don't park a script in here cranking out a novel every thirty seconds. Run dry and you're paused till it resets (or ask me nicely).

      ## 5. No Warranty, No Promises
      This is run by one person, not a Fortune 500. It might go down. It might say something gloriously dumb. If it breaks I'll probably fix it, but I'm not legally on the hook if the robot whiffs or the site takes an afternoon nap.

      ## 6. I Can Change the Rules
      If I update these, the newest version is the one that counts. Groundbreaking, I know.

      That's it. Now go make something ridiculous.
